<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#646F4B" />
  <title>오프라인 | 무브IQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #f7faf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1e15;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(100,111,75,.1);
      border: 1px solid #e8ede4;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; color: #646F4B; margin-bottom: 12px; }
    p  { font-size: 14px; line-height: 1.7; color: #7a8570; margin-bottom: 8px; }
    .hint { font-size: 12px; color: #a4ad98; margin-top: 16px; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: #646F4B;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }
    .btn:hover { background: #4d5938; }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: #646F4B;
      border-radius: 8px;
      position: relative;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 8px;
      background: #bfd2bf;
      border-radius: 50%;
    }
    .logo-text { font-size: 18px; font-weight: 800; color: #646F4B; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark"></div>
      <span class="logo-text">무브IQ</span>
    </div>
    <div class="icon">📡</div>
    <h1>인터넷 연결을 확인해주세요</h1>
    <p>현재 오프라인 상태입니다.</p>
    <p>소음 지도와 AI 입지 분석은 인터넷 연결이 필요합니다.</p>
    <div class="hint">
      Wi-Fi 또는 모바일 데이터를 켜고<br/>다시 시도해주세요.
    </div>
    <button class="btn" onclick="window.location.reload()">다시 시도</button>
  </div>
  <script>
    // 온라인 복구 시 자동 리로드
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
